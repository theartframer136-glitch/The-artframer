name: Set PHP Limits (.user.ini)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run or commit"
        required: true
        default: "dry-run"
        type: choice
        options: [ dry-run, commit ]

jobs:
  set-limits:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SFTP_PRIVATE_KEY }}' | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Inspect / write .user.ini
        run: |
          WPROOT=/home/u979793747/websites/OPuOsKi4J/public_html
          SSH="ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          echo "--- Current .user.ini (if any) ---"
          $SSH u979793747_OPuOsKi4J@72.61.66.116 "cat '${WPROOT}/.user.ini' 2>/dev/null || echo '(no .user.ini found)'"

          if [ "${{ github.event.inputs.mode }}" = "commit" ]; then
            echo "--- Writing .user.ini ---"
            $SSH u979793747_OPuOsKi4J@72.61.66.116 "cat > '${WPROOT}/.user.ini' <<'EOF'
          max_execution_time = 300
          max_input_time = 300
          max_input_vars = 10000
          memory_limit = 512M
          post_max_size = 64M
          upload_max_filesize = 64M
          EOF"
            $SSH u979793747_OPuOsKi4J@72.61.66.116 "cat '${WPROOT}/.user.ini'"
          else
            echo "--- Dry-run only. Re-run with mode=commit to apply. ---"
          fi

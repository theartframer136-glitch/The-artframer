name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Discover server paths
        run: |
          ssh -p 65002 -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            u979793747_OPuOsKi4J@72.61.66.116 \
            "echo '=== pwd ===' && pwd && echo '=== HOME ===' && echo \$HOME && echo '=== find ===' && find \$HOME -maxdepth 4 -name 'public_html' -type d 2>/dev/null"

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='wp-config.php' \
            --exclude='wp-content/uploads/' \
            --exclude='wp-content/cache/' \
            --exclude='wp-content/upgrade/' \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ u979793747_OPuOsKi4J@72.61.66.116:domains/theartframer.us/public_html/

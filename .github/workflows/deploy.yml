name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Test SSH connection + discover paths
        run: |
          ssh -p 65002 -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            u979793747_OPuOsKi4J@72.61.66.116 \
            'echo "=== SSH_OK ===";
             echo "=== pwd ==="; pwd;
             echo "=== HOME ==="; echo $HOME;
             echo "=== ls home ==="; ls -la $HOME;
             echo "=== WP root ==="; ls -la /home/u979793747/websites/OPuOsKi4J/public_html/wp-content/themes/ 2>/dev/null || echo "path not found, trying alternates";
             echo "=== find public_html ==="; find $HOME -maxdepth 5 -name "public_html" -type d 2>/dev/null'

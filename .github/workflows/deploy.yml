name: Deploy to Hostinger
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SFTP_PRIVATE_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy theme
        run: |
          rsync -avz --delete \
            --exclude ".git" --exclude ".github" --exclude ".vscode" --exclude "node_modules" \
            --exclude ".gitkeep" --exclude "screenshot.jpg" \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./postero-child/ \
            u979793747_OPuOsKi4J@72.61.66.116:/home/u979793747/websites/OPuOsKi4J/public_html/wp-content/themes/postero-child/

      - name: Purge cache (LiteSpeed + object cache)
        run: |
          ssh -p 65002 -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            u979793747_OPuOsKi4J@72.61.66.116 \
            'set -e; WPROOT=/home/u979793747/websites/OPuOsKi4J/public_html; cd "$WPROOT"; \
             if command -v wp >/dev/null 2>&1; then WP=wp; \
             else curl -sSLO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar; chmod +x wp-cli.phar; WP="php wp-cli.phar"; fi; \
             $WP litespeed-purge all --path="$WPROOT" 2>/dev/null || true; \
             $WP cache flush --path="$WPROOT" 2>/dev/null || true; \
             echo "cache purge requested"'

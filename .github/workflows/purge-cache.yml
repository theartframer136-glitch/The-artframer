name: Purge Caches (manual)

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SFTP_PRIVATE_KEY }}' | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Purge LiteSpeed + object + OPcache
        run: |
          WPROOT=/home/u979793747/websites/OPuOsKi4J/public_html
          THEME_DIR="${WPROOT}/wp-content/themes/postero-child"
          SSH="ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          $SSH u979793747_OPuOsKi4J@72.61.66.116 \
            "cd '${WPROOT}'; \
             if command -v wp >/dev/null 2>&1; then WP=wp; \
             else curl -sSLO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar; chmod +x wp-cli.phar; WP='php wp-cli.phar'; fi; \
             \$WP litespeed-purge all --path='${WPROOT}' 2>/dev/null || true; \
             \$WP cache flush --path='${WPROOT}' 2>/dev/null || true; \
             echo 'litespeed/object cache purged'"

          set +e
          OC=$(printf '%s' '<?php if(function_exists("opcache_reset")){opcache_reset();} echo "OC_OK";' | base64 -w0)
          $SSH u979793747_OPuOsKi4J@72.61.66.116 "echo '${OC}' | base64 -d > '${THEME_DIR}/_oc.php'"
          curl -fsS "https://theartframer.us/wp-content/themes/postero-child/_oc.php" || echo "(opcache curl failed)"
          $SSH u979793747_OPuOsKi4J@72.61.66.116 "rm -f '${THEME_DIR}/_oc.php'"
